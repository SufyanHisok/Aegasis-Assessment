<section class="login-page">
  <div class="login-page__blob login-page__blob--tl"></div>
  <div class="login-page__blob login-page__blob--br"></div>
  <div class="login-page__blob login-page__blob--center"></div>

  <article class="login-card">
    <header class="login-card__brand">
      <img class="login-card__logo" src="/assets/logo.svg" alt="Aegasis Labs" />
    </header>

    <div class="login-card__copy">
      <p class="login-card__tagline">Sign in to your workspace</p>
    </div>

    <form class="login-card__form" [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="login-card__field">
        <label class="login-card__label" for="login-email">Email address</label>
        <input
          class="login-card__input"
          id="login-email"
          type="email"
          formControlName="email"
          autocomplete="email"
        />
      </div>

      <div class="login-card__field">
        <label class="login-card__label" for="login-password">Password</label>
        <input
          class="login-card__input"
          id="login-password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
      </div>

      @if (errorMessage()) {
        <p class="login-card__error">{{ errorMessage() }}</p>
      }

      <button class="login-card__submit" type="submit">Sign in</button>
    </form>
  </article>
</section>
